# VALIDATION RULES
# ============================================================================

validation:
  # 必填字段验证：这些字段缺失时中止生成
  critical_fields:
    - patient_name
    - sample_id
    - project_name
    - report_date
  
  # 数据类型验证
  type_validation:
    string:
      max_length: 500
      trim: true          # 自动去除首尾空格
    int:
      min: 0
      max: 2147483647
    float:
      min: 0.0
      max: 100000.0
    date:
      format: "%Y-%m-%d"  # 统一日期格式
      allow_formats:      # 支持的输入格式（自动转换）
        - "%Y-%m-%d"
        - "%Y/%m/%d"
        - "%Y%m%d"
        - "%Y.%m.%d"
  
  # 数值范围验证（特定字段）
  field_constraints:
    af:                   # 变异频率必须在0-100之间
      min: 0.0
      max: 100.0
    age:                  # 年龄合理范围
      min: 0
      max: 120
    qc_q30:              # Q30比例0-100%
      min: 0.0
      max: 100.0
    qc_coverage:         # 覆盖度0-100%
      min: 0.0
      max: 100.0

# ============================================================================
# DATA CLEANING RULES

# ========== 化疗药物详细解析表（自动生成） ==========
# 30个药物详细表格，每个药物一个表格
# 格式：基因、检测位点、基因型、等级、检测结果、参考文献

data_cleaning:
  # 文本清洗规则
  text:
    remove_invisible_chars: true      # 去除不可见字符
    normalize_whitespace: true        # 多个空格合并为单个
    full_width_to_half: true          # 全角字符转半角（数字、字母）
    strip: true                       # 去除首尾空格
  
  # 数值清洗规则
  numeric:
    remove_chars: [" ", "%", "，", ","]  # 去除这些字符
    full_width_to_half: true          # 全角数字转半角
  
  # 日期清洗规则
  date:
    auto_detect: true                 # 自动检测日期格式
    fallback_to_today: false          # 解析失败时不使用今天日期
    invalid_handling: "null"          # 无效日期处理：null/empty/error

# ============================================================================
# MAPPING VERSION
# ============================================================================

metadata:
  mapping_version: "1.0.0"
  created_date: "2025-10-24"
  last_updated: "2025-10-24"
  author: "reportgen"
  description: "字段映射配置用于Excel到Docx报告生成系统"
  supported_project_types:
    - "结直肠癌301基因+MSI"
    - "结直肠癌358基因+MSI"
    - "肺癌甲基化"

# ============================================================================
# NOTES
# ============================================================================

# 使用说明:
# 1. synonyms列表中的匹配是不区分大小写的
# 2. synonyms匹配时会自动去除空格
# 3. 第一个匹配的同义词会被使用
# 4. required=true的字段缺失时会中止生成并报错
# 5. required=false的字段缺失时使用default_value或null
# 6. format_template使用Python字符串格式化语法
# 7. 表格数据的empty_behavior决定空表时的行为：hide_section隐藏章节，show_placeholder显示占位文本，error报错
