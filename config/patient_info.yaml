# ============================================================================
# 患者信息配置文件
# ============================================================================
# 说明: 当Excel中缺少患者基本信息时，可以从此配置文件加载
# 优先级: Excel中的数据 > 此配置文件 > 默认值

# 按样本编号索引的患者信息
patients:
  # 示例: MLB2509307001
  MLB2509307001:
    patient_name: "张三"  # 患者姓名
    gender: "男"          # 性别: 男/女
    age: "45"             # 年龄
    pathology_id: "P202501001"  # 病理号
    hospital: "某某医院"    # 送检医院
    department: "肿瘤科"   # 科室
    collection_date: "2025-09-20"  # 采集日期
    receive_date: "2025-09-21"     # 接收日期
  
  # 其他样本可以添加类似条目
  # MLJY-LZ258008:
  #   patient_name: "李四"
  #   gender: "女"
  #   age: "38"
  #   ...

# 全局默认值（所有样本共用）
defaults:
  hospital: "某某医院"
  department: "肿瘤科"
  issuer: "张医生"
  reviewer: "李医生"

# 项目信息
project_info:
  project_name: "结直肠癌358基因检测"  # 项目名称
  detection_method: "NGS高通量测序"    # 检测方法


