# ============================================================================
# 数据过滤配置
# ============================================================================
#
# 本配置文件定义了各类数据的过滤规则，用于从大量原始数据中筛选出
# 具有临床意义的信息，提高报告质量和可读性。
#
# ============================================================================

# ---------- 变异数据过滤 (Variations) ----------
variations:
  # 是否启用过滤
  enabled: true

  # 策略0: 分级过滤（可选）
  # 如果Variations表中存在分级列（如 ExistIn552 = Ⅰ类/Ⅱ类/Ⅲ类），
  # 则优先使用该列过滤，仅保留指定分级的变异；用于对齐“终版报告只展示Ⅰ/Ⅱ/Ⅲ类”。
  class_filter:
    enabled: true
    class_columns:
      - "ExistIn552"
    allowed_classes:
      - "Ⅰ类"
      - "Ⅱ类"
      - "Ⅲ类"

  # 过滤策略：使用 OR 逻辑（满足任一条件即保留）
  # - frequency: 基于变异频率筛选（高频变异通常更可靠）
  # - clinical_significance: 基于临床显著性筛选（某些类型的变异更重要）

  # 策略1: 频率过滤
  frequency_filter:
    enabled: true
    # 最小频率阈值（百分比），低于此值的变异将被过滤掉（除非满足其他条件）
    min_frequency: 5.0
    # 频率字段的可能列名（按优先级排序）
    frequency_columns:
      - "Freq(%)"
      - "AF"
      - "变异频率"
      - "Frequency"
      - "freq"

  # 策略2: 临床显著性过滤
  clinical_significance_filter:
    enabled: true
    # 临床显著的变异类型关键词（包含任一关键词即认为有临床意义）
    significant_keywords:
      - "Missense"      # 错义突变：导致氨基酸改变
      - "Nonsense"      # 无义突变：导致提前终止
      - "Frameshift"    # 移码突变：改变阅读框
      - "Splice"        # 剪接位点变异：影响RNA剪接
    # 功能/类型字段的可能列名
    function_columns:
      - "Function"
      - "功能"
      - "Type"
      - "变异类型"
      - "Consequence"

  # 基本验证（无论如何都要满足）
  basic_validation:
    # 基因名必须存在
    require_gene: true
    gene_columns:
      - "Gene_Symbol"
      - "基因"
      - "Gene"
      - "gene"

    # 变异信息必须存在
    require_variant: true
    variant_columns:
      - "cHGVS"
      - "变异"
      - "Variant"
      - "HGVS"
      - "hgvs"

# ---------- CNV数据过滤 (Copy Number Variations) ----------
cnv:
  # 是否启用过滤
  enabled: false
  # CNV通常数量较少，暂不启用过滤

  # 拷贝数变异过滤条件（如需启用）
  copy_number_filter:
    # 显著的拷贝数变化阈值
    min_copy_number_change: 1.5  # 拷贝数 < 1.5 或 > 2.5 认为显著
    max_copy_number_normal: 2.5

# ---------- 融合基因过滤 (Fusions) ----------
fusion:
  # 是否启用过滤
  enabled: false
  # 融合基因通常数量较少，暂不启用过滤

  # 融合频率过滤（如需启用）
  frequency_filter:
    min_frequency: 3.0  # 融合频率阈值通常比点突变低

# ---------- HLA分型过滤 ----------
hla:
  # HLA分型不需要过滤（固定3个位点）
  enabled: false

# ============================================================================
# 过滤统计和报告
# ============================================================================
reporting:
  # 是否在日志中输出过滤统计
  log_filtering_stats: true

  # 是否在调试模式下输出被过滤掉的数据
  log_filtered_items: false  # 生产环境建议设为false

# ============================================================================
# 说明
# ============================================================================
#
# 1. 变异过滤策略：
#    - 使用 OR 逻辑：只要满足频率阈值 OR 临床显著性，即保留
#    - 这样既能保留高频变异，又能保留低频但重要的临床变异
#
# 2. 频率阈值选择：
#    - 5% 是经验值，过滤掉大部分低频噪音
#    - 可根据实际需求调整（1%-10%范围合理）
#
# 3. 临床显著性关键词：
#    - 基于变异功能注释，选择有临床意义的类型
#    - 可根据具体panel和需求增减关键词
#
# 4. 配置修改后无需重新编译，直接生效
#
# ============================================================================
